{% extends 'portfolio/base.html' %}

{% block content %}
<main class="main-projeto">

    <h1>Editar Formação</h1>

    <form action="{% url 'editar_formacao' formacao.id %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <table>
            {{ form }}
        </table>
        
        <button type="submit">Gravar</button>

        <a href="{% url 'editar_formacao' formacao.id %}">Apagar</a>
    </form>

</main>
{% endblock %}
