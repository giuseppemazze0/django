{% extends 'portfolio/base.html' %}

{% block content %}
<main class="main-projeto">

    <h1>Novo Projeto</h1>

    <form action="{% url 'novo_projeto' %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <table>
            {{ form }}
        </table>
        
        <button type="submit">Criar</button>
    </form>

</main>
{% endblock %}
